    <div class="modal-overlay hidden" id="modalOverlay">
      <div class="entry-box-modal">
        <button class="modal-close-x" id="cancelModalBtn" aria-label="Close without saving">&times;</button>

        <h3 class="modal-title">List ingredients you want to use up!</h3>

        <div class="input-container">

        </div>
